name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: uploadplatform_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Checkstyle
        run: mvn checkstyle:check -q

      - name: Test
        run: mvn verify -P ci
        env:
          DB_USER: postgres
          DB_PASS: postgres
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/uploadplatform_test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t upload-file-system:${{ github.sha }} .

      - name: Test Docker image starts
        run: |
          docker run -d --name test-app \
            -e SPRING_DATASOURCE_URL=jdbc:h2:mem:testdb \
            -e SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.H2Dialect \
            -p 8080:8080 \
            upload-file-system:${{ github.sha }}
          sleep 15
          curl --fail http://localhost:8080/actuator/health
          docker stop test-app
