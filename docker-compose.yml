services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_USER: postgres
      DB_PASS: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/uploadplatform
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - upload-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: uploadplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - upload-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - upload-net

volumes:
  pg-data:

networks:
  upload-net:
